version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nextjs:
        patterns:
          - next
          - eslint-config-next
      wallet:
        patterns:
          - wagmi
          - viem
          - "@rainbow-me/rainbowkit"
          - "@tanstack/react-query"
      hardhat:
        patterns:
          - hardhat
          - "@nomicfoundation/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
