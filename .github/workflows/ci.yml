name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        # --audit-level=critical: 25 high-severity findings exist in transitive
        # deps (viem, rainbowkit, wagmi, WalletConnect) with no direct exploit
        # path through OpenProof's static client-side surface.
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Contract tests
        run: npm run test:contracts
